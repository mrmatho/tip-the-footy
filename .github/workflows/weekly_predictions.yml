# .github/workflows/weekly_predictions.yml
name: Weekly AFL Predictions

on:
  schedule:
    - cron: "0 20 * * 3"   # Every Wednesday at 8 PM UTC (Thursday morning AEST)
  workflow_dispatch:        # Allow manual trigger

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install .
      - name: Fetch historical data
        run: python scripts/fetch_data.py
      - name: Build feature dataset
        run: python scripts/build_features.py
      - name: Train models
        run: python scripts/train_model.py
      - name: Generate predictions
        run: python scripts/generate_predictions.py
      - uses: actions/upload-artifact@v4
        with:
          name: predictions
          path: predictions/
